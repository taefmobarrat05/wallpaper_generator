<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Generator</title>
<style>
/* Body */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"San Francisco",Helvetica,Arial,sans-serif;
  padding:20px;
  background:#000000; /* AMOLED default */
  color:#f2f2f7;
  transition:0.3s;
}

body.light{
  background:#f2f2f7;
  color:#1c1c1e;
}

/* Card */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(14px);
  border-radius:22px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

body.light .card{
  background:rgba(255,255,255,0.85);
}

/* Palette preview */
#palettePreview{
  height:20px;
  border-radius:12px;
  margin-bottom:15px;
}

/* Palette */
.palette{
  display:flex;
  gap:15px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.color-box{
  width:50px;
  height:50px;
  border-radius:14px;
  cursor:pointer;
  border:2px solid rgba(255,255,255,0.2);
  transition:0.2s;
}
body.light .color-box{ border:2px solid rgba(0,0,0,0.1); }
.color-box:hover{
  transform:scale(1.1);
}

/* Inputs */
input, select{
  padding:6px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  margin:5px 5px 5px 0;
  background:#1c1c1e;
  color:white;
}

body.light input, body.light select{
  border:1px solid rgba(0,0,0,0.2);
  background:#fff;
  color:#1c1c1e;
}

/* Buttons */
button.action{
  background:#007aff;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

button.action:hover{
  background:#005ecb;
}

/* Canvas */
#previewCanvas{
  width:100%;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
}
body.light #previewCanvas{ border:1px solid rgba(0,0,0,0.1); }

/* iOS-style switches */
.switch{
  position: relative;
  display: inline-block;
  width:50px;
  height:28px;
}
.switch input{ opacity:0; width:0; height:0; }
.slider{
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background:#555;
  border-radius:28px;
  transition:.3s;
}
.slider:before{
  position:absolute;
  content:"";
  height:22px; width:22px;
  left:3px; bottom:3px;
  background:white;
  border-radius:50%;
  transition:.3s;
}
input:checked + .slider{
  background:#007aff;
}
input:checked + .slider:before{
  transform: translateX(22px);
}

/* Toggle container */
.toggleGroup{
  display:flex;
  gap:20px;
  align-items:center;
  margin:10px 0;
}
</style>
</head>

<body class="dark">

<h1>Wallpaper Generator</h1>

<div class="card">

<div id="palettePreview"></div>
<div class="palette" id="palette"></div>

Base Color:
<input type="color" id="baseColor" value="#007aff">

<br><br>

Width:
<input type="number" id="width" value="1920" style="width:80px;">
Height:
<input type="number" id="height" value="1080" style="width:80px;">

<br>

Letter Size:
<input type="number" id="fontSize" value="20" style="width:70px;">
Density:
<input type="number" id="density" value="70" style="width:70px;">
Letter Color:
<input type="color" id="textColor" value="#ffffff">

<br>

Custom Letters:
<input type="text" id="customText" style="width:140px;">

<!-- Dark Mode Toggle under Custom Letters -->
<div class="toggleGroup">
  <label>Dark Mode</label>
  <label class="switch">
    <input type="checkbox" id="darkModeSwitch" checked>
    <span class="slider"></span>
  </label>
</div>

<!-- Other toggles -->
<div class="toggleGroup">
  <label>Show Letters</label>
  <label class="switch">
    <input type="checkbox" id="showLetters" checked>
    <span class="slider"></span>
  </label>

  <label>Glow</label>
  <label class="switch">
    <input type="checkbox" id="glow">
    <span class="slider"></span>
  </label>

  <label>Vertical</label>
  <label class="switch">
    <input type="checkbox" id="vertical">
    <span class="slider"></span>
  </label>
</div>

<br>

Direction:
<select id="direction">
<option value="to right">Left → Right</option>
<option value="to bottom">Top → Bottom</option>
<option value="45deg">Diagonal</option>
</select>

Shape:
<select id="gradientShape">
<option value="linear">Linear</option>
<option value="radial">Radial</option>
</select>

<br>

<button class="action" onclick="generateNew()">New Palette</button>
<button class="action" onclick="downloadWallpaper()">Download</button>

</div>

<canvas id="previewCanvas" width="800" height="400"></canvas>

<script>
let palette=[];
const defaultChars="日本語東京京都山川火水風空愛夢桜龍心力光影未来忍者侍北海道花月星海";

/* Dark mode switch */
document.getElementById("darkModeSwitch").addEventListener("change", e=>{
  if(e.target.checked){
    document.body.classList.remove("light");
    document.body.classList.add("dark");
  } else {
    document.body.classList.remove("dark");
    document.body.classList.add("light");
  }
});

/* Palette helpers */
function randomColor(){ return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'); }
function randomChar(src){ return src[Math.floor(Math.random()*src.length)]; }

/* Palette */
function generatePalette(){
  palette=[];
  for(let i=0;i<5;i++) palette.push(randomColor());
}

function renderPalette(){
  const container=document.getElementById("palette");
  container.innerHTML="";
  palette.forEach((color,index)=>{
    const box=document.createElement("div");
    box.className="color-box";
    box.style.background=color;
    box.onclick=()=>{ document.getElementById("textColor").value=color; drawPreview(); };

    const picker=document.createElement("input");
    picker.type="color";
    picker.value=color;
    picker.oninput=(e)=>{
      palette[index]=e.target.value;
      box.style.background=e.target.value;
      updatePalettePreview();
      drawPreview();
    };

    container.appendChild(box);
    container.appendChild(picker);
  });

  updatePalettePreview();
}

function updatePalettePreview(){
  document.getElementById("palettePreview")
  .style.background=`linear-gradient(to right, ${palette.join(",")})`;
}

/* Base color */
document.getElementById("baseColor").addEventListener("input", ()=>{
  const base=document.getElementById("baseColor").value;
  palette=[];
  for(let i=0;i<5;i++){
    let r=parseInt(base.substr(1,2),16)+Math.floor(Math.random()*40-20);
    let g=parseInt(base.substr(3,2),16)+Math.floor(Math.random()*40-20);
    let b=parseInt(base.substr(5,2),16)+Math.floor(Math.random()*40-20);
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    palette.push(`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`);
  }
  renderPalette();
  drawPreview();
});

/* Gradient */
function createGradient(ctx,w,h){
  const shape=document.getElementById("gradientShape").value;
  const dir=document.getElementById("direction").value;

  let gradient;
  if(shape==="radial"){
    gradient=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.min(w,h)/2);
  }else{
    if(dir==="to right") gradient=ctx.createLinearGradient(0,0,w,0);
    else if(dir==="to bottom") gradient=ctx.createLinearGradient(0,0,0,h);
    else gradient=ctx.createLinearGradient(0,0,w,h);
  }

  palette.forEach((c,i)=>{
    gradient.addColorStop(i/(palette.length-1),c);
  });

  return gradient;
}

/* Draw preview */
function drawPreview(){
  const canvas=document.getElementById("previewCanvas");
  const ctx=canvas.getContext("2d");
  const w=canvas.width; const h=canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=createGradient(ctx,w,h);
  ctx.fillRect(0,0,w,h);

  if(!document.getElementById("showLetters").checked) return;

  const fontSize=parseInt(document.getElementById("fontSize").value);
  const density=parseInt(document.getElementById("density").value);
  const color=document.getElementById("textColor").value;
  const chars=document.getElementById("customText").value.trim()||defaultChars;
  const glow=document.getElementById("glow").checked;
  const vertical=document.getElementById("vertical").checked;

  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.font=fontSize+"px sans-serif";
  ctx.shadowBlur = glow ? 10 : 0;
  ctx.shadowColor = glow ? color : "transparent";

  for(let x=0;x<w;x+=density){
    for(let y=0;y<h;y+=density){
      ctx.save();
      ctx.globalAlpha=Math.random()*0.6+0.3;
      ctx.translate(x,y);
      if(vertical) ctx.rotate(Math.PI/2);
      ctx.fillStyle=color;
      ctx.fillText(randomChar(chars),0,0);
      ctx.restore();
    }
  }
  ctx.globalAlpha=1;
}

/* Download */
function downloadWallpaper(){
  const width=parseInt(document.getElementById("width").value);
  const height=parseInt(document.getElementById("height").value);
  
  const canvas=document.createElement("canvas");
  canvas.width=width;
  canvas.height=height;
  const ctx=canvas.getContext("2d");

  ctx.fillStyle=createGradient(ctx,width,height);
  ctx.fillRect(0,0,width,height);

  if(document.getElementById("showLetters").checked){
    const fontSize=parseInt(document.getElementById("fontSize").value);
    const density=parseInt(document.getElementById("density").value);
    const color=document.getElementById("textColor").value;
    const chars=document.getElementById("customText").value.trim() || defaultChars;
    const glow=document.getElementById("glow").checked;
    const vertical=document.getElementById("vertical").checked;

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font=fontSize+"px sans-serif";
    ctx.shadowBlur = glow ? 10 : 0;
    ctx.shadowColor = glow ? color : "transparent";

    for(let x=0;x<width;x+=density){
      for(let y=0;y<height;y+=density){
        ctx.save();
        ctx.globalAlpha=Math.random()*0.6+0.3;
        ctx.translate(x,y);
        if(vertical) ctx.rotate(Math.PI/2);
        ctx.fillStyle=color;
        ctx.fillText(randomChar(chars),0,0);
        ctx.restore();
      }
    }
    ctx.globalAlpha=1;
  }

  const link=document.createElement("a");
  link.download=`wallpaper-${width}x${height}.png`;
  link.href=canvas.toDataURL("image/png");
  link.click();
}

/* Live update */
document.querySelectorAll("input, select").forEach(el=>{ el.addEventListener("input", drawPreview); });

/* Init */
generatePalette();
renderPalette();
drawPreview();
</script>

</body>
</html>
