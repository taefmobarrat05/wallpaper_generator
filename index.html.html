<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Generator</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"San Francisco",Helvetica,Arial,sans-serif;
  padding:15px;
  background:#000;
  color:#f2f2f7;
  transition:0.3s;
}
body.light{ background:#f2f2f7; color:#1c1c1e; }
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
  margin-bottom:15px;
}
body.light .card{ background:rgba(255,255,255,0.85); }

#palettePreview{ height:16px; border-radius:12px; margin-bottom:10px; }
.palette{ display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.color-box{ width:40px; height:40px; border-radius:12px; cursor:pointer; border:2px solid rgba(255,255,255,0.2); transition:0.2s; }
body.light .color-box{ border:2px solid rgba(0,0,0,0.1); }
.color-box:hover{ transform:scale(1.1); }

input, select{
  padding:4px 8px; border-radius:10px; border:1px solid rgba(255,255,255,0.2);
  margin:3px 3px 3px 0; background:#1c1c1e; color:white; font-size:13px;
}
body.light input, body.light select{ border:1px solid rgba(0,0,0,0.2); background:#fff; color:#1c1c1e; }

button.action{ background:#007aff; color:white; border:none; padding:6px 12px; border-radius:12px; font-weight:600; cursor:pointer; margin-top:5px; font-size:13px;}
button.action:hover{ background:#005ecb; }

#previewCanvas{ width:100%; height:400px; border-radius:16px; border:1px solid rgba(255,255,255,0.2); margin-top:10px; }
body.light #previewCanvas{ border:1px solid rgba(0,0,0,0.1); }

.switch{ position: relative; display: inline-block; width:40px; height:22px; }
.switch input{ opacity:0; width:0; height:0; }
.slider{ position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#555; border-radius:22px; transition:.3s; }
.slider:before{ position:absolute; content:""; height:18px; width:18px; left:2px; bottom:2px; background:white; border-radius:50%; transition:.3s; }
input:checked + .slider{ background:#007aff; }
input:checked + .slider:before{ transform: translateX(18px); }
.toggleGroup{ display:flex; gap:15px; align-items:center; margin:5px 0; flex-wrap:wrap; font-size:13px;}
</style>
</head>
<body class="dark">

<h1 style="font-size:22px; text-align:center; margin-bottom:10px;">Wallpaper Generator</h1>

<div class="card">
<div id="palettePreview"></div>
<div class="palette" id="palette"></div>

Base Color:
<input type="color" id="baseColor" value="#007aff"><br>

Device:
<select id="deviceSelector">
  <option value="pc">PC (1920x1080)</option>
  <option value="mobile">Mobile (1080x1920)</option>
</select><br>

Width:
<input type="number" id="width" value="1920" style="width:70px;">
Height:
<input type="number" id="height" value="1080" style="width:70px;"><br>

Letter Size:
<input type="number" id="fontSize" value="20" style="width:60px;">
Density:
<input type="number" id="density" value="70" style="width:60px;">
Letter Color:
<input type="color" id="textColor" value="#ffffff"><br>

Custom Letters:
<input type="text" id="customText" style="width:120px;"><br>

Letter Position:
<select id="letterPosition">
<option value="center">Center</option>
<option value="top-left">Top Left</option>
<option value="top-right">Top Right</option>
<option value="bottom-left">Bottom Left</option>
<option value="bottom-right">Bottom Right</option>
<option value="top-center">Top Center</option>
<option value="bottom-center">Bottom Center</option>
<option value="middle-left">Middle Left</option>
<option value="middle-right">Middle Right</option>
<option value="left">Left</option>
<option value="right">Right</option>
</select><br>

<!-- Dark Mode Toggle -->
<div class="toggleGroup">
  <label>Dark Mode</label>
  <label class="switch"><input type="checkbox" id="darkModeSwitch" checked><span class="slider"></span></label>
</div>

<!-- Other toggles -->
<div class="toggleGroup">
  <label>Show Letters</label>
  <label class="switch"><input type="checkbox" id="showLetters" checked><span class="slider"></span></label>

  <label>Glow</label>
  <label class="switch"><input type="checkbox" id="glow"><span class="slider"></span></label>

  <label>Vertical</label>
  <label class="switch"><input type="checkbox" id="vertical"><span class="slider"></span></label>
</div>

Direction:
<select id="direction">
<option value="45deg" selected>Diagonal</option>
<option value="to right">Left → Right</option>
<option value="to bottom">Top → Bottom</option>
</select>
Shape:
<select id="gradientShape">
<option value="linear">Linear</option>
<option value="radial">Radial</option>
</select><br>

<button class="action" onclick="generateNew()">New Palette</button>
<button class="action" onclick="downloadWallpaper()">Download</button>
</div>

<canvas id="previewCanvas" width="800" height="400"></canvas>

<script>
let palette=[], defaultChars="日本語東京京都山川火水風空愛夢桜龍心力光影未来忍者侍北海道花月星海";

/* Dark mode */
document.getElementById("darkModeSwitch").addEventListener("change", e=>{
  document.body.className = e.target.checked ? "dark" : "light";
});

/* Device Selector */
document.getElementById("deviceSelector").addEventListener("change", e=>{
  if(e.target.value==="pc"){ document.getElementById("width").value=1920; document.getElementById("height").value=1080; }
  else{ document.getElementById("width").value=1080; document.getElementById("height").value=1920; }
  drawPreview();
});

/* Palette */
function randomColor(){ return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'); }
function randomChar(src){ return src[Math.floor(Math.random()*src.length)]; }
function generatePalette(){ palette=[]; for(let i=0;i<5;i++) palette.push(randomColor()); }
function renderPalette(){
  const container=document.getElementById("palette");
  container.innerHTML="";
  palette.forEach((color,index)=>{
    const box=document.createElement("div"); box.className="color-box"; box.style.background=color;
    box.onclick=()=>{ document.getElementById("textColor").value=color; drawPreview(); };
    const picker=document.createElement("input"); picker.type="color"; picker.value=color;
    picker.oninput=(e)=>{ palette[index]=e.target.value; box.style.background=e.target.value; updatePalettePreview(); drawPreview(); };
    container.appendChild(box); container.appendChild(picker);
  });
  updatePalettePreview();
}
function updatePalettePreview(){ document.getElementById("palettePreview").style.background=`linear-gradient(to right, ${palette.join(",")})`; }
document.getElementById("baseColor").addEventListener("input", ()=>{
  const base=document.getElementById("baseColor").value; palette=[]; for(let i=0;i<5;i++){
    let r=parseInt(base.substr(1,2),16)+Math.floor(Math.random()*40-20);
    let g=parseInt(base.substr(3,2),16)+Math.floor(Math.random()*40-20);
    let b=parseInt(base.substr(5,2),16)+Math.floor(Math.random()*40-20);
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    palette.push(`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`);
  }
  renderPalette(); drawPreview();
});

/* Gradient */
function createGradient(ctx,w,h){
  const shape=document.getElementById("gradientShape").value;
  const dir=document.getElementById("direction").value;
  let gradient;
  if(shape==="radial") gradient=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.min(w,h)/2);
  else if(dir==="to right") gradient=ctx.createLinearGradient(0,0,w,0);
  else if(dir==="to bottom") gradient=ctx.createLinearGradient(0,0,0,h);
  else gradient=ctx.createLinearGradient(0,0,w,h);
  palette.forEach((c,i)=>{ gradient.addColorStop(i/(palette.length-1),c); });
  return gradient;
}

/* Draw preview */
function drawPreview(){
  const canvas=document.getElementById("previewCanvas");
  const ctx=canvas.getContext("2d");
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=createGradient(ctx,w,h); ctx.fillRect(0,0,w,h);

  if(!document.getElementById("showLetters").checked) return;
  const fontSize=parseInt(document.getElementById("fontSize").value);
  const density=parseInt(document.getElementById("density").value);
  const color=document.getElementById("textColor").value;
  const chars=document.getElementById("customText").value.trim()||defaultChars;
  const glow=document.getElementById("glow").checked;
  const vertical=document.getElementById("vertical").checked;

  const position=document.getElementById("letterPosition").value;
  let offsetX=w/2, offsetY=h/2;
  if(position.includes("top")) offsetY=0.2*h;
  if(position.includes("bottom")) offsetY=0.8*h;
  if(position.includes("left")) offsetX=0.2*w;
  if(position.includes("right")) offsetX=0.8*w;
  if(position==="left") offsetX=0.2*w, offsetY=h/2;
  if(position==="right") offsetX=0.8*w, offsetY=h/2;

  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font=fontSize+"px sans-serif";
  ctx.shadowBlur = glow ? 10 : 0; ctx.shadowColor = glow ? color : "transparent";

  for(let x=0;x<w;x+=density){
    for(let y=0;y<h;y+=density){
      ctx.save(); ctx.globalAlpha=Math.random()*0.6+0.3;
      ctx.translate(offsetX + x - w/2, offsetY + y - h/2);
      if(vertical) ctx.rotate(Math.PI/2);
      ctx.fillStyle=color; ctx.fillText(randomChar(chars),0,0); ctx.restore();
    }
  }
  ctx.globalAlpha=1;
}

/* Download */
function downloadWallpaper(){
  const width=parseInt(document.getElementById("width").value);
  const height=parseInt(document.getElementById("height").value);
  const canvasDL=document.createElement("canvas"); canvasDL.width=width; canvasDL.height=height;
  const ctx=canvasDL.getContext("2d");
  ctx.fillStyle=createGradient(ctx,width,height); ctx.fillRect(0,0,width,height);

  if(document.getElementById("showLetters").checked){
    const fontSize=parseInt(document.getElementById("fontSize").value);
    const density=parseInt(document.getElementById("density").value);
    const color=document.getElementById("textColor").value;
    const chars=document.getElementById("customText").value.trim()||defaultChars;
    const glow=document.getElementById("glow").checked;
    const vertical=document.getElementById("vertical").checked;
    const position=document.getElementById("letterPosition").value;

    let offsetX=width/2, offsetY=height/2;
    if(position.includes("top")) offsetY=0.2*height;
    if(position.includes("bottom")) offsetY=0.8*height;
    if(position.includes("left")) offsetX=0.2*width;
    if(position.includes("right")) offsetX=0.8*width;
    if(position==="left") offsetX=0.2*width, offsetY=height/2;
    if(position==="right") offsetX=0.8*width, offsetY=height/2;

    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font=fontSize+"px sans-serif";
    ctx.shadowBlur = glow ? 10 : 0; ctx.shadowColor = glow ? color : "transparent";

    for(let x=0;x<width;x+=density){
      for(let y=0;y<height;y+=density){
        ctx.save(); ctx.globalAlpha=Math.random()*0.6+0.3;
        ctx.translate(offsetX + x - width/2, offsetY + y - height/2);
        if(vertical) ctx.rotate(Math.PI/2);
        ctx.fillStyle=color; ctx.fillText(randomChar(chars),0,0); ctx.restore();
      }
    }
  }

  const link=document.createElement("a"); link.download=`wallpaper-${width}x${height}.png`;
  link.href=canvasDL.toDataURL("image/png"); link.click();
}

/* Init */
function generateNew(){ generatePalette(); renderPalette(); drawPreview(); }
document.querySelectorAll("input, select").forEach(el=>el.addEventListener("input", drawPreview));
generateNew();
</script>
</body>
</html>
